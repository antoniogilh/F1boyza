<!-- resultater.html -->
<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="fanelogo.png" />
  <title>F1 BOYZA – Resultater</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="hero small">
  <div class="overlay">
    <h1>Resultater</h1>
    <p>Tall lyver ikke. Folk gjør.</p>
  </div>
</header>
<nav class="topnav">
  <div class="menu-toggle">☰</div>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Forside</a>
    <a href="kalender.html">Kalender</a>
    <a href="resultater.html">Resultater</a>
    <a href="straff.html">Skammelig kjøring</a>
    <a href="Spinthatshit.html">Spin that SHIIIT</a>
  </div>
</nav>
<main class="container single">

  <div class="season-filter">
    <label for="seasonSelect">Sesong:</label>
    <select id="seasonSelect" class="season-select"></select>
  </div>

  <section class="card">
    <h2>⚡ Fun Stats</h2>
    <div id="statsBlock" class="stats-block"></div>
  </section>

  <section class="card">
    <h2>📊 Dominans</h2>
    <div id="dominanceMeter"></div>
  </section>

  <section class="card">
    <div class="card-header">
      <h2>Poengutvikling – Førere</h2>
      <button id="chartToggle" class="toggle-btn">Vis per runde</button>
    </div>
    <canvas id="driverChart"></canvas>
    <table id="driverTable" class="standings-table">
      <thead><tr><th>#</th><th>Fører</th><th style="text-align:right">Totalt</th><th style="text-align:right">Gap</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="card">
    <h2>Poengutvikling – Lag</h2>
    <canvas id="teamChart"></canvas>
    <table id="teamTable" class="standings-table">
      <thead><tr><th>#</th><th>Lag</th><th style="text-align:right">Totalt</th><th style="text-align:right">Gap</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="card">
    <h2>🥊 Head-to-head</h2>
    <div class="h2h-selects">
      <select id="h2hDriver1" class="season-select"></select>
      <span class="h2h-vs">VS</span>
      <select id="h2hDriver2" class="season-select"></select>
    </div>
    <p id="h2hGap" class="h2h-gap"></p>
    <canvas id="h2hChart"></canvas>
  </section>

</main>
<footer>© F1 BOYZA</footer>

<script src="js/app.js"></script>
</body>
</html>
